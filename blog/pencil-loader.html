<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pencil Loader</title>
    <style>
      *,
      *::before,
      *::after {
        border: 0;
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --surface: #fdf6e3;
        --ink: #2c1a0e;
        font-size: calc(18px + (28 - 18) * (100vw - 320px) / (1280 - 320));
      }
      body {
        background: var(--surface);
        color: var(--ink);
        font: 1em/1.5 sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pencil {
        display: block;
        width: 9em;
        height: 9em;
        filter: drop-shadow(0 4px 18px rgba(220, 160, 0, 0.18));
      }

      .pencil-shell1,
      .pencil-shell2,
      .pencil-shell3,
      .pencil-cap,
      .pencil-cap-tilt,
      .pencil-tip,
      .pencil-spin,
      .pencil-trail {
        animation-duration: 3.5s;
        animation-timing-function: linear;
        animation-iteration-count: infinite;
      }

      .pencil-shell1,
      .pencil-shell2,
      .pencil-shell3 {
        transform: rotate(-90deg);
      }
      .pencil-shell1 {
        animation-name: pencilShell1;
      }
      .pencil-shell2 {
        animation-name: pencilShell2;
      }
      .pencil-shell3 {
        animation-name: pencilShell3;
      }

      .pencil-cap {
        animation-name: pencilCap;
        transform: rotate(-90deg) translate(49px, 0);
      }
      .pencil-cap-tilt {
        animation-name: pencilCapTilt;
        animation-timing-function: ease-in-out;
      }
      .pencil-tip {
        animation-name: pencilTip;
        transform: rotate(-90deg) translate(49px, -30px);
      }
      .pencil-spin {
        animation-name: pencilSpin;
      }
      .pencil-trail {
        animation-name: pencilTrail;
        transform: translate(100px, 100px) rotate(-113deg);
      }

      @keyframes pencilShell1 {
        from,
        to {
          stroke-dashoffset: 351.86;
          transform: rotate(-90deg);
        }
        50% {
          stroke-dashoffset: 150.8;
          transform: rotate(-225deg);
        }
      }
      @keyframes pencilShell2 {
        from,
        to {
          stroke-dashoffset: 406.84;
          transform: rotate(-90deg);
        }
        50% {
          stroke-dashoffset: 174.36;
          transform: rotate(-225deg);
        }
      }
      @keyframes pencilShell3 {
        from,
        to {
          stroke-dashoffset: 296.88;
          transform: rotate(-90deg);
        }
        50% {
          stroke-dashoffset: 127.23;
          transform: rotate(-225deg);
        }
      }
      @keyframes pencilCap {
        from,
        to {
          transform: rotate(-45deg) translate(49px, 0);
        }
        50% {
          transform: rotate(0deg) translate(49px, 0);
        }
      }
      @keyframes pencilCapTilt {
        from,
        32.5%,
        67.5%,
        to {
          transform: skewX(0);
        }
        35%,
        65% {
          transform: skewX(-4deg);
        }
        37.5%,
        62.5% {
          transform: skewX(8deg);
        }
        40%,
        45%,
        50%,
        55%,
        60% {
          transform: skewX(-15deg);
        }
        42.5%,
        47.5%,
        52.5%,
        57.5% {
          transform: skewX(15deg);
        }
      }
      @keyframes pencilTip {
        from,
        to {
          transform: rotate(-90deg) translate(49px, -30px);
        }
        50% {
          transform: rotate(-225deg) translate(49px, -30px);
        }
      }
      @keyframes pencilSpin {
        from {
          transform: translate(100px, 100px) rotate(0deg);
        }
        to {
          transform: translate(100px, 100px) rotate(720deg);
        }
      }
      @keyframes pencilTrail {
        from {
          stroke-dashoffset: 439.82;
          transform: translate(100px, 100px) rotate(-113deg);
        }
        50% {
          stroke-dashoffset: 164.93;
          transform: translate(100px, 100px) rotate(-113deg);
        }
        75%,
        to {
          stroke-dashoffset: 439.82;
          transform: translate(100px, 100px) rotate(112deg);
        }
      }
    </style>
  </head>
  <body>
    <svg
      class="pencil"
      viewBox="0 0 200 200"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-label="Loading"
    >
      <defs>
        <clipPath id="pencil-cap-clip">
          <rect rx="5" ry="5" width="30" height="30" />
        </clipPath>
      </defs>

      <!-- Trail arc -->
      <circle
        class="pencil-trail"
        r="70"
        fill="none"
        stroke="#5a5a5a"
        stroke-width="2"
        stroke-dasharray="439.82 439.82"
        stroke-dashoffset="439.82"
        stroke-linecap="round"
        transform="rotate(-113,100,100)"
      />

      <!-- Spinning group -->
      <g class="pencil-spin" transform="translate(100,100)">
        <!-- Body rings -->
        <g fill="none">
          <circle
            class="pencil-shell1"
            r="64"
            stroke="#F9C22E"
            stroke-width="30"
            stroke-dasharray="402.12 402.12"
            stroke-dashoffset="402"
            transform="rotate(-90)"
          />
          <circle
            class="pencil-shell2"
            r="74"
            stroke="#FBDB6A"
            stroke-width="10"
            stroke-dasharray="464.96 464.96"
            stroke-dashoffset="465"
            transform="rotate(-90)"
          />
          <circle
            class="pencil-shell3"
            r="54"
            stroke="#D4981E"
            stroke-width="10"
            stroke-dasharray="339.29 339.29"
            stroke-dashoffset="339"
            transform="rotate(-90)"
          />
        </g>

        <!-- Eraser cap -->
        <g class="pencil-cap" transform="rotate(-90) translate(49,0)">
          <g class="pencil-cap-tilt">
            <rect fill="#F4A0B0" rx="5" ry="5" width="30" height="30" />
            <rect
              fill="#f07a90"
              width="5"
              height="30"
              clip-path="url(#pencil-cap-clip)"
            />
            <rect fill="#d8d8d8" width="30" height="20" />
            <rect fill="#b0b0b0" width="15" height="20" />
            <rect fill="#c8c8c8" width="5" height="20" />
            <rect fill="rgba(0,0,0,0.15)" y="6" width="30" height="2" />
            <rect fill="rgba(0,0,0,0.15)" y="13" width="30" height="2" />
          </g>
        </g>

        <!-- Pencil tip -->
        <g class="pencil-tip" transform="rotate(-90) translate(49,-30)">
          <polygon fill="#C8855A" points="15 0,30 30,0 30" />
          <polygon fill="#A0613A" points="15 0,6 30,0 30" />
          <polygon fill="#2e2e2e" points="15 0,20 10,10 10" />
        </g>
      </g>
    </svg>
  </body>
</html>
