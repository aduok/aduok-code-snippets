<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credit Card Form</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f0f13;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  /* Animated background blobs */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .blob-1 { width: 500px; height: 500px; background: #a855f7; top: -100px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -80px; right: -80px; animation-delay: -4s; }
  .blob-3 { width: 300px; height: 300px; background: #ec4899; top: 50%; left: 50%; animation-delay: -8s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to { transform: translate(40px, -30px) scale(1.1); }
  }

  .wrapper {
    position: relative; z-index: 1;
    width: 100%;
    max-width: 480px;
    padding: 20px;
  }

  /* CARD SCENE */
  .card-scene {
    width: 380px;
    height: 240px;
    perspective: 1000px;
    margin: 0 auto 32px;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-front, .card-back {
    position: absolute; inset: 0;
    border-radius: 20px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  /* Card gradient & glossy effect */
  .card-front {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    padding: 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }

  /* Animated aurora on card */
  .card-front::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%; left: -50%;
    background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(168,85,247,0.3) 60deg, rgba(59,130,246,0.2) 120deg, transparent 180deg, rgba(236,72,153,0.2) 240deg, transparent 300deg);
    animation: aurora 8s linear infinite;
  }

  @keyframes aurora {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .card-front::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%, rgba(255,255,255,0.03) 100%);
    border-radius: 20px;
  }

  .card-back {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);
    transform: rotateY(180deg);
    box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }

  .card-back::before {
    content: '';
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%; left: -50%;
    background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(168,85,247,0.3) 60deg, rgba(59,130,246,0.2) 120deg, transparent 180deg);
    animation: aurora 8s linear infinite;
  }

  .magnetic-stripe {
    position: absolute;
    top: 48px;
    left: 0; right: 0;
    height: 52px;
    background: linear-gradient(180deg, #111 0%, #222 50%, #111 100%);
    z-index: 1;
  }

  .cvv-section {
    position: absolute;
    bottom: 60px;
    left: 0; right: 0;
    padding: 0 28px;
    z-index: 1;
  }

  .cvv-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: right;
    margin-bottom: 6px;
  }

  .cvv-band {
    background: rgba(255,255,255,0.92);
    border-radius: 4px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 14px;
  }

  .cvv-dots {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    color: #111;
    letter-spacing: 4px;
  }

  /* Card front content */
  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative; z-index: 1;
  }

  .card-brand {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
    letter-spacing: 1px;
  }

  .mastercard-logo {
    display: flex;
    position: relative;
  }

  .mc-circle {
    width: 36px; height: 36px;
    border-radius: 50%;
    position: absolute;
  }

  .mc-left { background: #eb001b; left: 0; }
  .mc-right { background: #f79e1b; left: 18px; }

  .mastercard-logo { width: 54px; height: 36px; }

  .chip {
    width: 44px; height: 34px;
    background: linear-gradient(135deg, #d4af37 0%, #f5d060 40%, #d4af37 70%, #b8960c 100%);
    border-radius: 6px;
    position: relative; z-index: 1;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2);
    overflow: hidden;
  }

  .chip::before {
    content: '';
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,0,0,0.2);
    transform: translateY(-50%);
  }

  .chip::after {
    content: '';
    position: absolute;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(0,0,0,0.2);
    transform: translateX(-50%);
  }

  .card-number-display {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
    position: relative; z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    white-space: nowrap;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative; z-index: 1;
  }

  .card-info-label {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .card-info-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 1px;
    min-width: 80px;
  }

  /* FORM */
  .form-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 32px;
    backdrop-filter: blur(20px);
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, select {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 15px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: rgba(168,85,247,0.6);
    background: rgba(168,85,247,0.08);
    box-shadow: 0 0 0 3px rgba(168,85,247,0.12);
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  select option { background: #1a1a2e; color: #fff; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .cvv-field input {
    border-color: rgba(236,72,153,0.3);
  }
  .cvv-field input:focus {
    border-color: rgba(236,72,153,0.7);
    background: rgba(236,72,153,0.08);
    box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
  }

  button {
    width: 100%;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  button::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:hover::before { opacity: 1; }
  button:active { transform: translateY(0); }

  /* number highlight on card */
  .num-group {
    display: inline-block;
    transition: color 0.2s;
  }
  .num-group.active {
    color: #a855f7;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="wrapper">
  <!-- Card Visual -->
  <div class="card-scene">
    <div class="card-inner" id="cardInner">

      <!-- FRONT -->
      <div class="card-front">
        <div class="card-top">
          <div>
            <div class="card-brand">CreditCard</div>
            <div class="chip" style="margin-top:14px"></div>
          </div>
          <div class="mastercard-logo">
            <div class="mc-circle mc-left"></div>
            <div class="mc-circle mc-right"></div>
          </div>
        </div>

        <div class="card-number-display" id="cardNumDisplay">
          <span id="g1">####</span>
          <span id="g2">####</span>
          <span id="g3">####</span>
          <span id="g4">####</span>
        </div>

        <div class="card-bottom">
          <div>
            <div class="card-info-label">Card Holder</div>
            <div class="card-info-value" id="holderDisplay">FULL NAME</div>
          </div>
          <div>
            <div class="card-info-label">Expires</div>
            <div class="card-info-value" id="expiryDisplay">MM/YY</div>
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="card-back">
        <div class="magnetic-stripe"></div>
        <div class="cvv-section">
          <div class="cvv-label">CVV</div>
          <div class="cvv-band">
            <span class="cvv-dots" id="cvvDisplay">***</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Form -->
  <div class="form-card">
    <div class="field">
      <label>Card Number</label>
      <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19" inputmode="numeric" autocomplete="off">
    </div>

    <div class="field">
      <label>Card Holder</label>
      <input type="text" id="cardHolder" placeholder="Full Name" autocomplete="off">
    </div>

    <div class="row">
      <div class="field" style="margin-bottom:0">
        <label>Month</label>
        <select id="expMonth">
          <option value="">MM</option>
          <option>01</option><option>02</option><option>03</option><option>04</option>
          <option>05</option><option>06</option><option>07</option><option>08</option>
          <option>09</option><option>10</option><option>11</option><option>12</option>
        </select>
      </div>
      <div class="field" style="margin-bottom:0">
        <label>Year</label>
        <select id="expYear">
          <option value="">YY</option>
          <option>26</option><option>27</option><option>28</option><option>29</option>
          <option>30</option><option>31</option><option>32</option><option>33</option>
        </select>
      </div>
      <div class="field cvv-field" style="margin-bottom:0">
        <label>CVV</label>
        <input type="password" id="cvv" placeholder="***" maxlength="4" inputmode="numeric" autocomplete="off">
      </div>
    </div>

    <button>Pay Now</button>
  </div>
</div>

<script>
  const cardInner = document.getElementById('cardInner');
  const cardNumDisplay = document.getElementById('cardNumDisplay');
  const holderDisplay = document.getElementById('holderDisplay');
  const expiryDisplay = document.getElementById('expiryDisplay');
  const cvvDisplay = document.getElementById('cvvDisplay');

  const g1 = document.getElementById('g1');
  const g2 = document.getElementById('g2');
  const g3 = document.getElementById('g3');
  const g4 = document.getElementById('g4');

  // Card Number
  document.getElementById('cardNumber').addEventListener('input', function(e) {
    let val = this.value.replace(/\D/g, '').slice(0, 16);
    // Format with spaces for input
    let formatted = val.replace(/(.{4})/g, '$1 ').trim();
    this.value = formatted;

    // Groups
    const raw = [val.slice(0,4), val.slice(4,8), val.slice(8,12), val.slice(12,16)];
    const len = val.length;

    // Show actual digits as typed, pad remaining with #
    g1.textContent = raw[0].padEnd(4, '#');
    g2.textContent = raw[1].padEnd(4, '#');
    g3.textContent = raw[2].padEnd(4, '#');
    g4.textContent = raw[3].padEnd(4, '#');
  });

  // Card Holder
  document.getElementById('cardHolder').addEventListener('input', function() {
    holderDisplay.textContent = this.value.toUpperCase() || 'FULL NAME';
  });

  // Expiry
  function updateExpiry() {
    const m = document.getElementById('expMonth').value;
    const y = document.getElementById('expYear').value;
    expiryDisplay.textContent = (m || 'MM') + '/' + (y || 'YY');
  }
  document.getElementById('expMonth').addEventListener('change', updateExpiry);
  document.getElementById('expYear').addEventListener('change', updateExpiry);

  // CVV — flip card
  const cvvInput = document.getElementById('cvv');
  cvvInput.addEventListener('focus', () => cardInner.classList.add('flipped'));
  cvvInput.addEventListener('blur', () => cardInner.classList.remove('flipped'));
  cvvInput.addEventListener('input', function() {
    const val = this.value.replace(/\D/g, '').slice(0, 4);
    this.value = val;
    cvvDisplay.textContent = '*'.repeat(val.length) || '***';
  });
</script>
</body>
</html>
